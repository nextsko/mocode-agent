version: 2

project_name: mocode

before:
  hooks:
    - go mod tidy

builds:
  - id: mocode
    main: .
    binary: mocode
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=greenteagc
    ldflags:
      - -s -w
      - -X github.com/package-register/mocode/internal/util/version.Version={{.Version}}
      - -X github.com/package-register/mocode/internal/util/version.Commit={{.ShortCommit}}
    flags:
      - -buildvcs=false
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    # mocode_v0.7.0_linux_amd64.tar.gz / mocode_v0.7.0_windows_amd64.zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore(deps)"
      - "^Merge "
  groups:
    - title: "Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Refactors"
      regexp: "^refactor"
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: nextsko
    name: mocode-agent
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## mocode {{ .Tag }}

    Install via npm:
    ```sh
    npm install -g @mocode/cli
    # or
    npx @mocode/cli
    ```

    Or download the binary directly below.
