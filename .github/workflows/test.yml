name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOEXPERIMENT: greenteagc
      GOPROXY: https://goproxy.cn,direct
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: go build -buildvcs=false ./...

      - name: Test
        run: go test -failfast -timeout 10m -p 2 ./...

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GOPROXY: https://goproxy.cn,direct
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Determine golangci-lint scope
        id: golangci
        shell: bash
        run: |
          set -euo pipefail
          args=(--config=.golangci.yml --timeout=5m --whole-files)
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && -n "${GITHUB_BASE_REF:-}" ]]; then
            args+=(--new-from-merge-base="origin/${GITHUB_BASE_REF}")
          elif git rev-parse --verify HEAD~1 > /dev/null 2>&1; then
            args+=(--new-from-rev=HEAD~1)
          else
            args+=(--new)
          fi
          printf 'args=%s\n' "${args[*]} ./" >> "$GITHUB_OUTPUT"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: ${{ steps.golangci.outputs.args }}
